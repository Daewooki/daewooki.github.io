name: Auto Generate Blog Posts

on:
  # 매일 오전 9시 (KST) = UTC 00:00에 실행
  schedule:
    - cron: '0 0 * * *'
  
  # 수동 실행
  workflow_dispatch:
    inputs:
      num_posts:
        description: '생성할 포스트 개수 (1-4)'
        required: false
        default: '2'
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'

permissions:
  contents: write

# pages-deploy.yml과 동일한 "pages" 그룹을 쓰면 push 직후 상대 워크플로가
# cancel-in-progress로 이 잡을 끊어 배포 단계가 실패·취소로 보일 수 있음.
# 배포는 push로 트리거되는 pages-deploy.yml만 담당한다.
concurrency:
  group: auto-post
  cancel-in-progress: true

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install Python dependencies
        run: |
          pip install openai
      
      - name: Generate blog posts with web search
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NUM_POSTS: ${{ github.event.inputs.num_posts || '2' }}
        run: |
          python scripts/generate_post.py
      
      - name: Commit new posts
        run: |
          git config --local user.email "eodnr9221@gmail.com"
          git config --local user.name "Daewook Kwon"
          git add _posts/
          
          if git diff --staged --quiet; then
            echo "No new posts to commit"
          else
            POST_COUNT=$(git diff --staged --name-only | wc -l)
            git commit -m "📝 Auto-generated ${POST_COUNT} trend post(s) - $(date +'%Y-%m-%d')"
            # 체크아웃 이후 원격에 커밋이 생기면 단순 push가 거절될 수 있음
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push origin HEAD
          fi
