name: Auto Generate Blog Posts

on:
  # 매일 오전 9시 (KST) = UTC 00:00에 실행
  schedule:
    - cron: '0 0 * * *'
  
  # 수동 실행
  workflow_dispatch:
    inputs:
      num_posts:
        description: '생성할 포스트 개수 (1-4)'
        required: false
        default: '2'
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install Python dependencies
        run: |
          pip install openai
      
      - name: Generate blog posts with web search
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NUM_POSTS: ${{ github.event.inputs.num_posts || '2' }}
        run: |
          python scripts/generate_post.py
      
      - name: Commit new posts
        run: |
          git config --local user.email "eodnr9221@gmail.com"
          git config --local user.name "Daewook Kwon"
          git add _posts/ scripts/post_history.json

          # _posts 하위 변경만 있을 때 실제 새 포스트로 간주
          if git diff --staged --name-only | grep -q '^_posts/'; then
            POST_COUNT=$(git diff --staged --name-only -- '_posts/' | wc -l)
            git commit -m "📝 Auto-generated ${POST_COUNT} trend post(s) - $(date +'%Y-%m-%d')"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push origin HEAD
            echo "HAS_NEW_POSTS=true" >> $GITHUB_ENV
          else
            echo "No new posts to commit"
            echo "HAS_NEW_POSTS=false" >> $GITHUB_ENV
          fi

      # Jekyll 빌드 및 배포 (새 포스트가 있을 때만)
      - name: Setup Pages
        if: env.HAS_NEW_POSTS == 'true'
        id: pages
        uses: actions/configure-pages@v4

      - name: Setup Ruby
        if: env.HAS_NEW_POSTS == 'true'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.3
          bundler-cache: true

      - name: Build Jekyll site
        if: env.HAS_NEW_POSTS == 'true'
        run: bundle exec jekyll b -d "_site${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: "production"

      - name: Upload site artifact
        if: env.HAS_NEW_POSTS == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site${{ steps.pages.outputs.base_path }}"

      - name: Deploy to GitHub Pages
        if: env.HAS_NEW_POSTS == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
